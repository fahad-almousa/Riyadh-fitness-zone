<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join - Riyadh Fitness Zone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
		<img src="logo.jpeg" alt="Riyadh Fitness Zone Logo" id="siteLogo">
		<h1>Riyadh Fitness Zone</h1>
	</header>
    <nav>
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="join.html">Join Us</a>
    </nav>

    <main>
        <h2>Register Now</h2>
        <form id="regForm">
            <label>Name:</label><br>
            <input type="text" required><br>
            <label>Mobile:</label><br>
            <input type="tel" required><br>
            <label>Select Branch:</label><br>
            <select>
                <option>Olaya</option>
                <option>Diplomatic Quarter</option>
            </select><br>
            <label>Preferred Start Date:</label><br>
            <input type="date"><br><br>
            <button type="submit">Submit Application</button>
        </form>

        <p id="msg" style="font-weight:bold; color:green;"></p>
    </main>

    <script>
        var myForm = document.getElementById("regForm");
        var displayMsg = document.getElementById("msg");

        myForm.onsubmit = function(event) {
            event.preventDefault();
            displayMsg.textContent = "Thank you for your interest! Our team in Riyadh will contact you soon.";
        };
    </script>

</body>
</html>
